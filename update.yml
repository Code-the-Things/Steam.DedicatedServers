---
  - name: Update Steam Server
    hosts: all
    gather_facts: true
    become: true
    vars:
      SERVERID: "{{ morpheus['customOptions']['steamAppId'] }}"
      GAME_PATH: "{{ morpheus['customOptions']['gamePath'] | default('/steam/server') or '/steam/server' }}"

    tasks:
      - name: Stop Screen Session
        shell: |
          screen -S steam -X stuff "^C"
          sleep 30
        become: true
        become_user: steam

      - name: Steamcmd login anonymous
        shell:
          cmd: /usr/games/steamcmd +login anonymous +quit
        become: true
        become_user: steam

      - name: Update Steam Dedicated Server
        shell:
          cmd: |
            /usr/games/steamcmd +force_install_dir '{{ GAME_PATH }}' +app_update {{ SERVERID }} -validate +quit
        become: true
        become_user: steam

      - name: Start Screen Session
        shell: |
          screen -dmS steam /steam/start.sh
        become: true
        become_user: steam
