---
- name: Install Wine
  import_role:
    name: wine

- name: Create game install directory
  file:
    path: "{{ GAME_PATH }}"
    state: directory
    owner: steam
    group: steam
    mode: '0755'

- name: Steamcmd login anonymous
  shell:
    cmd: /usr/games/steamcmd +login anonymous +quit
  become: true
  become_user: steam

- name: Install Windrose Dedicated Server
  shell:
    cmd: |
      /usr/games/steamcmd +@sSteamCmdForcePlatformType windows +force_install_dir '{{ GAME_PATH }}' +login anonymous +app_update {{ SERVERID }} -validate +quit
  become: true
  become_user: steam

- name: Symlink Windrose Server Config
  file:
    src: /steam/morpheus/ServerDescription.json
    dest: "{{ GAME_PATH }}/R5/ServerDescription.json"
    state: link
    owner: steam
    group: steam
    mode: 0644
    force: true

- name: Create start.sh file
  copy:
    content: |
      #!/bin/bash
      wine cmd /c '{{ GAME_PATH }}\StartServerForeground.bat'
    dest: /steam/start.sh
    mode: '0755'

- name: Fix File Permissions
  file:
    path: /steam/
    owner: steam
    group: steam
    recurse: true

- name: Start server once to generate version data
  shell: |
    screen -dmS steam_init /steam/start.sh
    sleep 10
    wineserver -k
    screen -S steam_init -X quit
  become: true
  become_user: steam
  ignore_errors: true

- name: Detect GAMEVERSION from ServerDescription.json
  shell: |
    grep -o '"DeploymentId": *"[^"]*"' {{ GAME_PATH }}/R5/ServerDescription.json \
      | grep -o '"[0-9][^"]*"' \
      | tr -d '"' \
      | cut -d'.' -f1-3
  register: detected_gameversion
  become: true
  become_user: steam

- name: Ensure Worlds/{{ WORLD }} directory exists
  file:
    path: "{{ GAME_PATH }}/R5/Saved/SaveProfiles/Default/RocksDB/{{ detected_gameversion.stdout }}/Worlds/{{ WORLD }}"
    state: directory
    owner: steam
    group: steam
    mode: '0755'

- name: Symlink Windrose World Config
  file:
    src: /steam/morpheus/WorldDescription.json
    dest: "{{ GAME_PATH }}/R5/Saved/SaveProfiles/Default/RocksDB/{{ detected_gameversion.stdout }}/Worlds/{{ WORLD }}/WorldDescription.json"
    state: link
    owner: steam
    group: steam
    mode: 0644
    force: true

- name: Start Screen Session
  shell: |
    screen -dmS steam /steam/start.sh
  become: true
  become_user: steam
