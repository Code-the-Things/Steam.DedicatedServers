---
- name: Install Wine
  import_role:
    name: wine

- name: Create game install directory
  file:
    path: "{{ GAME_PATH }}"
    state: directory
    owner: steam
    group: steam
    mode: '0755'

- name: Steamcmd login anonymous
  shell:
    cmd: /usr/games/steamcmd +login anonymous +quit
  become: true
  become_user: steam

- name: Install Windrose Dedicated Server
  shell:
    cmd: |
      /usr/games/steamcmd +@sSteamCmdForcePlatformType windows +force_install_dir '{{ GAME_PATH }}' +login anonymous +app_update {{ SERVERID }} -validate +quit
  become: true
  become_user: steam

- name: Symlink Windrose Server Config
  file:
    src: /steam/morpheus/ServerDescription.json
    dest: "{{ GAME_PATH }}/R5/ServerDescription.json"
    state: link
    owner: steam
    group: steam
    mode: 0644
    force: true

- name: Create start.sh file
  copy:
    content: |
      #!/bin/bash
      wine cmd /c '{{ GAME_PATH }}\StartServerForeground.bat'
    dest: /steam/start.sh
    mode: '0755'

- name: Fix File Permissions
  file:
    path: /steam/
    owner: steam
    group: steam
    recurse: true

- name: Start server once to generate world data
  shell: |
    screen -dmS steam_init /steam/start.sh
    sleep 10
    wineserver -k
    screen -S steam_init -X quit
  become: true
  become_user: steam
  ignore_errors: true

- name: Detect WorldIslandId from generated Worlds directory
  shell: |
    find {{ GAME_PATH }}/R5/Saved/SaveProfiles/Default/RocksDB -mindepth 2 -maxdepth 2 -type d -name 'Worlds' \
      | head -1 \
      | xargs -I{} find {} -mindepth 1 -maxdepth 1 -type d \
      | head -1 \
      | xargs basename
  register: detected_world_id
  become: true
  become_user: steam

- name: Detect RocksDB version path
  shell: |
    find {{ GAME_PATH }}/R5/Saved/SaveProfiles/Default/RocksDB -mindepth 1 -maxdepth 1 -type d | head -1
  register: detected_rocksdb_path
  become: true
  become_user: steam

- name: Symlink Windrose World Config
  file:
    src: /steam/morpheus/WorldDescription.json
    dest: "{{ detected_rocksdb_path.stdout }}/Worlds/{{ detected_world_id.stdout }}/WorldDescription.json"
    state: link
    owner: steam
    group: steam
    mode: 0644
    force: true

- name: Update WorldDescription.json islandId with detected WorldIslandId
  shell: |
    contents=$(jq --arg id "{{ detected_world_id.stdout }}" '.islandId = $id' /steam/morpheus/WorldDescription.json) \
      && echo "$contents" > /steam/morpheus/WorldDescription.json
  become: true
  become_user: steam

- name: Start Screen Session
  shell: |
    screen -dmS steam /steam/start.sh
  become: true
  become_user: steam
