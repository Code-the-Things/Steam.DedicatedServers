---
- name: Create game install directory
  file:
    path: "{{ GAME_PATH }}"
    state: directory
    owner: steam
    group: steam
    mode: '0755'

- name: Install Palworld
  shell:
    cmd: |
      /usr/games/steamcmd +@sSteamCmdForcePlatformType linux +force_install_dir '{{ GAME_PATH }}' +login anonymous +app_update {{ SERVERID }} -validate +quit
  become: true
  become_user: steam

- name: Install Metamod and Sourcemod
  import_role:
    name: metamod

- name: Symlink Start Script
  file:
    src: "{{ GAME_PATH }}/PalServer.sh"
    dest: /steam/start.sh
    state: link
    owner: steam
    group: steam
    mode: a+x
    force: true

- name: Create Required Directories
  file:
    path: "{{ item }}"
    state: directory
    owner: steam
    group: steam
    mode: 0777
  loop:
    - "{{ GAME_PATH }}/Pal/Saved/Config/LinuxServer"

- name: Symlink Server Config
  file:
    src: /steam/morpheus/PalWorldSettings.ini
    dest: "{{ GAME_PATH }}/Pal/Saved/Config/LinuxServer/PalWorldSettings.ini"
    state: link
    owner: steam
    group: steam
    mode: 0644
    force: true

- name: Fix File Permissions
  file:
    path: /steam/
    owner: steam
    group: steam
    recurse: true

- name: Start Screen Session
  shell: |
    screen -dmS steam /steam/start.sh
  become: true
  become_user: steam
